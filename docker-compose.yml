services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: blog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d blog_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/blog_db
      JWT_SECRET: tu-secreto-jwt-cambiame
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_DB: blog_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: